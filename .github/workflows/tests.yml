name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile
        run: >-
          python -m py_compile app.py final_update2_adapter.py final_update2_backend.py
          final_update2_backend_source.py review_routing.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v

